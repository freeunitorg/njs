name: Build and Release njs

on:
  push:
    tags:
      - '*'  # (0.9.6, 0.9.7, etc.)

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev zlib1g-dev libpcre2-dev

      - name: Configure and build njs
        run: |
          ./configure
          make -j$(nproc)

      - name: Run tests
        run: |
          make test

      - name: Create source archive (for release)
        run: |
          git archive --format=tar.gz --output=njs-${{ github.ref_name }}.tar.gz --prefix=njs-${{ github.ref_name }}/ HEAD
          git archive --format=zip --output=njs-${{ github.ref_name }}.zip --prefix=njs-${{ github.ref_name }}/ HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            njs-*.tar.gz
            njs-*.zip
          generate_release_notes: true
